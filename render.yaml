services:
  - type: web
    name: brand-syndicate
    runtime: node
    plan: starter
    buildCommand: npm install && sh scripts/db-setup.sh && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brand-syndicate-db
          property: connectionString
      - key: NODE_ENV
        value: production

      # ── NextAuth v5 (PRIMARY) ────────────────────────────────────────────
      # FIX: NextAuth v5 reads AUTH_SECRET and AUTH_URL.
      # Set these in your Render dashboard. Value for AUTH_URL must be your
      # full deploy URL with NO trailing path (e.g. https://yourapp.onrender.com)
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false

      # ── NextAuth v4 compat aliases (keep both) ───────────────────────────
      # FIX: NEXTAUTH_URL must be the bare origin — NO /generate suffix.
      # Correct:   https://personalitytesting-7v48.onrender.com
      # WRONG:     https://personalitytesting-7v48.onrender.com/generate  ← causes 400
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false

      # ── App URL ──────────────────────────────────────────────────────────
      - key: NEXT_PUBLIC_APP_URL
        sync: false

      # ── AI ───────────────────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Payments ─────────────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      # ── Cloudinary (server-side — NO NEXT_PUBLIC_ prefix) ───────────────
      # FIX: server-side code reads CLOUDINARY_* (no prefix).
      # Using NEXT_PUBLIC_ prefix exposes your API secret to the browser bundle
      # AND makes the server-side upload code fail (it reads the unprefixed name).
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Email ─────────────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false

      # ── Pexels stock images ───────────────────────────────────────────────
      - key: PEXELS_API_KEY
        sync: false

      # ── Cron ─────────────────────────────────────────────────────────────
      - key: CRON_SECRET
        sync: false

      # ── Admin ────────────────────────────────────────────────────────────
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PHONE
        sync: false

      # ── Puppeteer (skip Chromium download on Render) ─────────────────────
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: 'true'
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: 'true'

databases:
  - name: brand-syndicate-db
    plan: starter
    databaseName: brandsyndicate

name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: get_diff
        run: |
          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr_diff.txt
          echo "diff_file=pr_diff.txt" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install anthropic requests

      - name: AI Review
        id: ai_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          python3 - <<EOF
          import os
          import requests
          from anthropic import Anthropic

          ANTHROPIC_API_KEY = os.getenv("ANTHROPIC_API_KEY")
          GITHUB_TOKEN = os.getenv("GITHUB_TOKEN")
          PR_NUMBER = os.getenv("PR_NUMBER")
          REPO_FULL_NAME = os.getenv("REPO_FULL_NAME")

          if not ANTHROPIC_API_KEY:
              print("ANTHROPIC_API_KEY not found. Skipping AI review.")
              exit(0)

          client = Anthropic(api_key=ANTHROPIC_API_KEY)

          with open("pr_diff.txt", "r") as f:
              diff_content = f.read()

          if not diff_content.strip():
              print("No diff content found. Skipping AI review.")
              exit(0)

          prompt = f"""
          You are an expert code reviewer. Review the following pull request diff and provide constructive feedback, identify potential bugs, suggest improvements, and ensure best practices are followed. Focus on code quality, security, performance, and maintainability. If there are no significant issues, provide a positive affirmation.

          Pull Request Diff:
          ```diff
          {diff_content}
          ```

          Provide your review in a concise Markdown format.
          """
          
          try:
              response = client.messages.create(
                  model="claude-3-haiku-20240307", # Using Haiku for faster response in PRs
                  max_tokens=1000,
                  messages=[
                      {"role": "user", "content": prompt}
                  ]
              )
              ai_feedback = response.content[0].text
          except Exception as e:
              ai_feedback = f"AI review failed: {e}. Please review manually."
              print(ai_feedback)

          # Post comment to PR
          url = f"https://api.github.com/repos/{REPO_FULL_NAME}/issues/{PR_NUMBER}/comments"
          headers = {
              "Authorization": f"Bearer {GITHUB_TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }
          data = {"body": ai_feedback}
          
          comment_response = requests.post(url, headers=headers, json=data)
          if comment_response.status_code == 201:
              print("AI review comment posted successfully.")
          else:
              print(f"Failed to post AI review comment: {comment_response.status_code} - {comment_response.text}")
          EOF

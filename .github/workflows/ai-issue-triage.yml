name: AI Issue Triage

on:
  issues:
    types: [opened, reopened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install anthropic requests

      - name: AI Issue Triage
        id: ai_triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_FULL_NAME: ${{ github.repository }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 - <<EOF
          import os
          import requests
          from anthropic import Anthropic

          ANTHROPIC_API_KEY = os.getenv("ANTHROPIC_API_KEY")
          GITHUB_TOKEN = os.getenv("GITHUB_TOKEN")
          ISSUE_NUMBER = os.getenv("ISSUE_NUMBER")
          REPO_FULL_NAME = os.getenv("REPO_FULL_NAME")
          ISSUE_TITLE = os.getenv("ISSUE_TITLE")
          ISSUE_BODY = os.getenv("ISSUE_BODY")

          if not ANTHROPIC_API_KEY:
              print("ANTHROPIC_API_KEY not found. Skipping AI issue triage.")
              exit(0)

          client = Anthropic(api_key=ANTHROPIC_API_KEY)

          prompt = f"""
          You are an expert GitHub issue triager. Analyze the following GitHub issue and perform two tasks:
          1. Suggest appropriate labels for the issue (e.g., 'bug', 'enhancement', 'question', 'documentation', 'feature', 'performance', 'security'). Provide only the labels as a comma-separated string.
          2. Provide a concise, helpful, and polite initial response to the user, acknowledging the issue and asking for any necessary clarification.

          Issue Title: {ISSUE_TITLE}
          Issue Body: {ISSUE_BODY}

          Respond in JSON format with two keys: 'labels' (string) and 'comment' (string).
          Example: {{"labels": "bug, frontend", "comment": "Thank you for reporting this issue!"}}
          """
          
          try:
              response = client.messages.create(
                  model="claude-3-haiku-20240307", # Using Haiku for faster response in issue triage
                  max_tokens=500,
                  messages=[
                      {"role": "user", "content": prompt}
                  ]
              )
              ai_response_raw = response.content[0].text
              ai_response = json.loads(ai_response_raw)
              ai_labels = ai_response.get("labels", "").split(",")
              ai_comment = ai_response.get("comment", "")
          except Exception as e:
              ai_labels = []
              ai_comment = f"AI triage failed: {e}. Please triage manually."
              print(f"AI triage failed: {e}")

          # Add labels to issue
          if ai_labels:
              labels_url = f"https://api.github.com/repos/{REPO_FULL_NAME}/issues/{ISSUE_NUMBER}/labels"
              headers = {
                  "Authorization": f"Bearer {GITHUB_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28"
              }
              labels_response = requests.post(labels_url, headers=headers, json=ai_labels)
              if labels_response.status_code == 200:
                  print(f"Labels {ai_labels} added successfully.")
              else:
                  print(f"Failed to add labels: {labels_response.status_code} - {labels_response.text}")

          # Post comment to issue
          if ai_comment:
              comments_url = f"https://api.github.com/repos/{REPO_FULL_NAME}/issues/{ISSUE_NUMBER}/comments"
              headers = {
                  "Authorization": f"Bearer {GITHUB_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28"
              }
              data = {"body": ai_comment}
              comment_response = requests.post(comments_url, headers=headers, json=data)
              if comment_response.status_code == 201:
                  print("AI triage comment posted successfully.")
              else:
                  print(f"Failed to post AI triage comment: {comment_response.status_code} - {comment_response.text}")
          EOF
